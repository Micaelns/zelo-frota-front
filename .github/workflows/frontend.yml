name: Zelo Frota Pipeline

on:
  push:
    branches:
      - "release/*"

  workflow_dispatch:
    inputs:
      tag:
        description: "Release para promover (ex: release-1.2.0)"
        required: true
        type: string

env:
  IMAGE_NAME: zelo-frota-front
  ACR_NAME: ccrzelofrotafronthlg
  ACR_LOGIN_SERVER: acrzelofrotafront.azurecr.io

jobs:
  ################################################################################
  # BUILD + HLG
  ################################################################################

  build-and-deploy-hlg:
    if: github.event_name == 'push'

    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install packages
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Tests
        run: npm test

      - name: Build
        run: npm run build

      - name: Login Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Login ACR
        run: |
          az acr login \
            --name ${{ env.ACR_NAME }}

      - name: Build Docker Image
        run: |
          docker build \
            -t ${{ env.ACR_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:${{ github.ref_name }} \
            .

      - name: Push Docker Image
        run: |
          docker push \
            ${{ env.ACR_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:${{ github.ref_name }}

      - name: Deploy HLG
        run: |
          echo "Deploy HLG"

  ################################################################################
  # PROMOTION PRD
  ################################################################################

  deploy-prd:
    if: github.event_name == 'workflow_dispatch'

    runs-on: ubuntu-latest

    environment:
      name: PRD

    steps:
      - name: Login Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Login ACR
        run: |
          az acr login \
            --name ${{ secrets.ACR_NAME }}

      - name: Set Variables
        run: |

          echo "RELEASE=${{ github.event.inputs.tag }}" >> $GITHUB_ENV

          echo "VERSION=${{ github.event.inputs.tag }}" \
            | sed 's/release-/v/' \
            >> $GITHUB_ENV

      ###########################################################

      - name: Pull Current Latest
        run: |
          docker pull \
          ${{ secrets.ACR_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:latest || true

      - name: Save latest as latest-stable
        run: |

          docker tag \
          ${{ secrets.ACR_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:latest \
          ${{ secrets.ACR_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:latest-stable || true

          docker push \
          ${{ secrets.ACR_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:latest-stable || true

      ###########################################################

      - name: Pull Release Image
        run: |

          docker pull \
          ${{ secrets.ACR_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:${{ env.RELEASE }}

      ###########################################################

      - name: Create Official Version
        run: |

          docker tag \
          ${{ secrets.ACR_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:${{ env.RELEASE }} \
          ${{ secrets.ACR_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:${{ env.VERSION }}

      - name: Update latest
        run: |

          docker tag \
          ${{ secrets.ACR_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:${{ env.RELEASE }} \
          ${{ secrets.ACR_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:latest

      ###########################################################

      - name: Push Official Version
        run: |

          docker push \
          ${{ secrets.ACR_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:${{ env.VERSION }}

      - name: Push latest
        run: |

          docker push \
          ${{ secrets.ACR_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:latest

      ###########################################################

      - name: Deploy PRD
        run: |
          echo "Deploy PRD"
          # Azure WebApp / ContainerApp
          # será configurado posteriormente
